version: "3.9"

services:
  elsevier-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elsevier-paper-alert
    restart: unless-stopped

    # Load secrets from .env file (never commit .env to git)
    env_file:
      - .env

    # Persist the SQLite DB and logs between container restarts
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./papers.db:/app/papers.db

    # Health-check: verify the process is still running
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.path.exists('papers.db') or exit(1)"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
